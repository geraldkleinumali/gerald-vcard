<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef2f7;
}

.header {
  background: linear-gradient(90deg, #1f3c88, #2d6cdf);
  color: white;
  padding: 12px;
  text-align: center;
  font-weight: bold;
}

.search-box {
  background: #3f63c7;
  padding: 15px;
  text-align: center;
}

.search-box input {
  width: 60%;
  max-width: 400px;
  padding: 10px;
  border: none;
}

.search-box button {
  width: 30%;
  max-width: 150px;
  padding: 10px;
  background: #00c853;
  border: none;
  color: white;
  cursor: pointer;
}

.container {
  padding: 15px;
  max-width: 900px;
  margin: auto;
}

.loading {
  display: none;
  text-align: center;
  margin-top: 20px;
  color: gray;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  margin-top: 15px;
  display: none;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.5s;
}

.card.show {
  opacity: 1;
  transform: translateY(0);
}

.title {
  font-weight: bold;
  margin-bottom: 10px;
}

.small {
  font-size: 13px;
  color: gray;
}

.cert-img {
  width: 60%;
  max-width: 500px;
  display: block;
  margin: 20px auto;
  border-radius: 8px;
}

.chat {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #00c853;
  color: white;
  padding: 12px 15px;
  border-radius: 30px;
}
</style>
</head>

<body>

<div class="header">
  📘 Teacher Record
</div>

<div class="search-box">
  <input type="text" value="TR2427590628">
  <button onclick="search()">Search</button>
</div>

<div class="container">

  <div class="loading" id="loading">
    Verifying certificate...
  </div>

  <div class="card" id="result">
    <div class="title">120 hour Professional TEFL</div>
    <div class="small">TeacherRecord, accredited course provider</div>

    <p><b>Teacher Name:</b> KEN CYRIL BACTOL SUMALINOG</p>
    <p><b>Date of Issue:</b> Sep. 2024</p>
    <p><b>Certificate Number:</b> TR2427590628</p>

    <img src="images/cert.jpg" class="cert-img">
  </div>

</div>

<div class="chat">❓ Have a question?</div>

<script>
function search() {
  document.getElementById("loading").style.display = "block";

  setTimeout(() => {
    document.getElementById("loading").style.display = "none";

    let card = document.getElementById("result");
    card.style.display = "block";

    setTimeout(() => {
      card.classList.add("show");
    }, 100);

  }, 2000);
}
</script>

</body>
</html>
