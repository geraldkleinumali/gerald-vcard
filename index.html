<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerald Umali</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1f3c88, #2d6cdf);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* CARD */
.card {
  background: white;
  width: 320px;
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

/* PROFILE */
.profile {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #2d6cdf;
  margin-bottom: 10px;
}

/* TEXT */
.name {
  font-size: 20px;
  font-weight: bold;
}

.title {
  font-size: 14px;
  color: gray;
  margin-bottom: 15px;
}

/* BUTTONS */
.btn {
  display: block;
  text-decoration: none;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  color: white;
  font-weight: bold;
}

.phone { background: #00c853; }
.email { background: #ff6d00; }
.fb { background: #1877f2; }
.download { background: #6a1b9a; }

.btn:hover {
  opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">

  <!-- PALITAN MO IMAGE -->
  <img src="profile.jpg" class="profile">

  <div class="name">Gerald B. Umali</div>
  <div class="title">Graphic Artist | Developer</div>

  <!-- ACTION BUTTONS -->
  <a href="tel:+639XXXXXXXXX" class="btn phone">📞 Call Me</a>
  <a href="mailto:your@email.com" class="btn email">📧 Email Me</a>
  <a href="https://facebook.com/yourprofile" class="btn fb">👍 Facebook</a>

  <!-- DOWNLOAD CONTACT -->
  <a href="gerald.vcf" class="btn download">⬇️ Save Contact</a>

</div>

</body>
</html>
